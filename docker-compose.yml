services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smarthome
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1234"
    volumes:
      - /opt/postgres:/var/lib/postgresql/data
    networks:
      - haus-net

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - /opt/mosquitto/config:/mosquitto/config
      - /opt/mosquitto/data:/mosquitto/data
      - /opt/mosquitto/log:/mosquitto/log
    networks:
      - haus-net

  backend:
    build:
      context: ./backend
    container_name: haus-backend
    restart: unless-stopped
    depends_on:
      - postgres
      - mosquitto
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    networks:
      - haus-net

  frontend:
    build:
      context: ./frontend
    container_name: haus-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - haus-net

networks:
  haus-net:
    external: true
